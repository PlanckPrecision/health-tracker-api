{% extends "base.html" %}

{% block body %}

<!-- Header -->
<header class="space-y-2 mb-10">
    <div class="label-sm text-primary tracking-[0.2em] uppercase font-semibold text-xs">Goals</div>
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-on-surface">
        Set Your Goal Weight
    </h1>
    <p class="text-secondary max-w-xl text-lg font-light leading-relaxed">
        Define your target and stay focused on your journey.
    </p>
</header>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Left Panel: Goal Form -->
    <div class="lg:col-span-1 space-y-6">
        <div class="glass-panel p-6 rounded-2xl border border-outline-variant/30 shadow-2xl">
            <h1 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-cyan-400">flag</span>
                Set Goal Weight
            </h1>

            <form action="{{ url_for('entries.goals') }}" method="post" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
                        Goal Weight (kg)
                    </label>
                    <input autocomplete="off" autofocus name="goal_weight" placeholder="00.0" type="text"
                           value="{{ goal_weight if goal_weight is defined else (goal.goal_weight if goal else '') }}"
                           class="w-full bg-surface-container-highest border-outline-variant rounded-xl text-white focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all py-3 px-4">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
                        Starting Weight (kg)
                    </label>
                    <input autocomplete="off" name="start_weight" placeholder="00.0" type="text"
                           value="{{ start_weight if start_weight is defined else (goal.start_weight if goal else '') }}"
                           class="w-full bg-surface-container-highest border-outline-variant rounded-xl text-white focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all py-3 px-4">
                </div>

                <button type="submit"
                        class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(71,234,237,0.3)]">
                    Save Goal
                </button>
            </form>

            {% if message %}
            <div class="mt-6 pt-4 border-t border-outline-variant/30">
                <p class="text-sm text-cyan-400 font-medium">{{ message }}</p>
            </div>
            {% endif %}
        </div>
    </div>

    <!-- Right Panel: Visual / Motivation -->
    <div class="lg:col-span-2">
        <div class="glass-panel p-6 rounded-2xl border border-outline-variant/30 shadow-2xl h-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white tracking-tight">Stay Motivated</h2>
                <span class="text-xs font-medium px-3 py-1 rounded-full bg-cyan-400/10 text-cyan-400 border border-cyan-400/20">
                    Goal Setting
                </span>
            </div>

            <div class="relative rounded-2xl overflow-hidden aspect-video shadow-2xl group">
                <img alt="Motivation" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                     src="{{ url_for('static', filename='images/mountain.jpg') }}">
                <div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-60"></div>
                <div class="absolute bottom-6 left-6 right-6">
                    <div class="bg-surface-container-high/60 backdrop-blur-md p-4 rounded-lg">
                        <p class="text-sm font-medium italic text-on-surface">
                            "A goal without a plan is just a wish."
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}

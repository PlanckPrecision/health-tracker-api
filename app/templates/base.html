<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weightly</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="{{ url_for('static', filename='js/datepicker.js') }}"></script>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "primary": "#47eaed",
                "surface": "#121416",
                "surface-container": "#1e2022",
                "surface-container-highest": "#333537",
                "outline-variant": "#3b4949",
                "on-surface": "#e2e2e5",
                "on-primary": "#003738",
                "error": "#ff5252"
            },
            "fontFamily": { "headline": ["Manrope"], "body": ["Manrope"] }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #121416; color: #e2e2e5; }
        .bg-obsidian-vignette { background: radial-gradient(circle at top center, #1a1c1e 0%, #121416 100%); }
        .glass-panel { backdrop-filter: blur(20px); background: rgba(30, 32, 34, 0.7); }
    </style>
</head>
<body class="bg-obsidian-vignette min-h-screen">
    
    <nav class="fixed top-0 w-full z-50 bg-[#121416]/80 backdrop-blur-xl shadow-[0_20px_40px_rgba(0,0,0,0.06)]">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <div class="text-2xl font-bold tracking-tighter text-cyan-400 font-headline">Weightly</div>
            
            <div class="hidden md:flex items-center space-x-8">
                <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 font-headline tracking-tight" href="/">Dashboard</a>
                <a class="text-slate-400 hover:text-cyan-300 transition-colors duration-300" href="/history">History</a>
            </div>

            <div class="flex items-center space-x-4">
            <a href="/login" class="text-[#bbc8d4] hover:text-[#e2e2e5] transition-colors active:scale-95 transition-transform text-sm font-bold uppercase tracking-widest px-4 py-2">
                Login
            </a>

            <a href="/signup" class="bg-[#47eaed] text-[#003738] px-6 py-2 rounded-lg font-bold hover:shadow-[0_0_20px_rgba(71,234,237,0.3)] active:scale-95 transition-all">
                Sign Up
            </a>
                
                <div class="h-10 w-[1px] bg-outline-variant/20 mx-2"></div>
                
                <div class="group relative">
                    <button class="flex items-center space-x-2 text-[#bbc8d4] hover:text-[#47eaed] transition-colors active:scale-95 transition-transform">
                        <div class="h-8 w-8 rounded-full overflow-hidden border border-outline-variant/20">
                            <img src="{{ url_for('static', filename='images/miku_icon.png') }}" alt="User profile" class="w-full h-full object-cover"/>
                        </div>
                    </button>
                    
                    <div class="absolute right-0 mt-2 w-48 bg-[#1e2022] border border-outline-variant/20 rounded-xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 py-2">
                        <a class="block px-4 py-2 text-sm text-[#e2e2e5] hover:bg-[#282a2c]/50 transition-colors" href="#">Profile Settings</a>
                        <div class="h-[1px] bg-outline-variant/10 my-1 mx-2"></div>
                        <a class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500/10 transition-colors" href="#">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16 px-6 max-w-7xl mx-auto space-y-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 rounded-lg {% if category == 'error' %}bg-red-900/50 text-red-200{% else %}bg-cyan-900/50 text-cyan-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block body %}{% endblock %}
    </main>
</body>
</html>

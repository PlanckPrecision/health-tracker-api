{% extends "base.html" %}

{% block body %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md space-y-6">

        <!-- Header -->
        <div class="space-y-1 text-center">
            <div class="text-primary tracking-[0.2em] uppercase font-semibold text-xs">Welcome back</div>
            <h1 class="text-4xl font-extrabold tracking-tighter text-on-surface">Log In</h1>
            <p class="text-on-surface/50 text-sm font-light">Continue your journey where you left off.</p>
        </div>

        <!-- Card -->
        <div class="glass-panel p-8 rounded-2xl border border-outline-variant/30 shadow-2xl">
            <form method="POST" class="space-y-5">

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface/50 mb-2">
                        Username
                    </label>
                    <input autocomplete="username" autofocus name="username" placeholder="your_username" required type="text"
                           class="w-full bg-surface-container-highest border border-outline-variant rounded-xl text-on-surface placeholder-on-surface/30 focus:ring-2 focus:ring-primary focus:border-transparent transition-all py-3 px-4 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface/50 mb-2">
                        Password
                    </label>
                    <input autocomplete="current-password" name="password" placeholder="••••••••" required type="password"
                           class="w-full bg-surface-container-highest border border-outline-variant rounded-xl text-on-surface placeholder-on-surface/30 focus:ring-2 focus:ring-primary focus:border-transparent transition-all py-3 px-4 outline-none">
                </div>

                <button type="submit"
                        class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(71,234,237,0.3)]">
                    Log In
                </button>

                <div class="text-center">
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-xs text-on-surface/40 hover:text-primary transition-colors">Forgot password?</a>
                </div>
            </form>
        </div>

        <!-- Footer links -->
        <div class="flex justify-between text-sm px-1">
            <span class="text-on-surface/40">No account?
                <a href="{{ url_for('auth.signup') }}" class="text-primary hover:brightness-125 font-semibold transition-all">Sign up</a>
            </span>
            <a href="{{ url_for('entries.index') }}" class="text-on-surface/40 hover:text-on-surface transition-colors">
                Continue as guest
            </a>
        </div>

    </div>
</div>
{% endblock %}

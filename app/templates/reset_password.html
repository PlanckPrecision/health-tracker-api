{% extends "base.html" %}

{% block body %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md space-y-6">

        <!-- Header -->
        <div class="space-y-1 text-center">
            <div class="text-primary tracking-[0.2em] uppercase font-semibold text-xs">Account recovery</div>
            <h1 class="text-4xl font-extrabold tracking-tighter text-on-surface">New Password</h1>
            <p class="text-on-surface/50 text-sm font-light">Choose a strong password for your account.</p>
        </div>

        <!-- Card -->
        <div class="glass-panel p-8 rounded-2xl border border-outline-variant/30 shadow-2xl">
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface/50 mb-2">
                        New password
                    </label>
                    <input autocomplete="new-password" autofocus name="password" placeholder="••••••••" required type="password"
                           class="w-full bg-surface-container-highest border border-outline-variant rounded-xl text-on-surface placeholder-on-surface/30 focus:ring-2 focus:ring-primary focus:border-transparent transition-all py-3 px-4 outline-none">
                    <p class="text-xs text-on-surface/30 mt-2">Min. 6 characters, at least one letter and one special character.</p>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface/50 mb-2">
                        Confirm password
                    </label>
                    <input autocomplete="new-password" name="confirm_password" placeholder="••••••••" required type="password"
                           class="w-full bg-surface-container-highest border border-outline-variant rounded-xl text-on-surface placeholder-on-surface/30 focus:ring-2 focus:ring-primary focus:border-transparent transition-all py-3 px-4 outline-none">
                </div>

                <button type="submit"
                        class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(71,234,237,0.3)]">
                    Reset Password
                </button>
            </form>
        </div>

        <!-- Footer links -->
        <div class="flex justify-between text-sm px-1">
            <a href="{{ url_for('auth.login') }}" class="text-primary hover:brightness-125 font-semibold transition-all">
                ← Back to Login
            </a>
        </div>

    </div>
</div>
{% endblock %}

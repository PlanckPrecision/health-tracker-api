{% extends "base.html" %}

{% block body %}

    <h1>Enter weight</h1>
    <form action="register" method="post">
        <input autocomplete="off" autofocus name="weight" placeholder="Weight" type="text">
        <input id="date-input" name="date" type="text" value="{{ today }}" readonly>
        <button type="submit">Register</button>
    </form>

    {% if weight %}
        <p>Last entry: {{ weight }} kg on {{ date }}</p>
    {% endif %}

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
   
    <div style="margin: 30px 0; max-width: 800px;">
        <h2>Weight Progress Chart</h2>
        <canvas id="weightChart" width="400" height="100"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/chart.js') }}"></script>

{% endblock %}
